name: Release Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  release-gate:
    name: Benchmark Release Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release gate
        run: |
          python scripts/run_release_gate.py

      - name: Run confidence harness gate
        run: |
          python test_confidence_validation.py --min-precision 0.85 --min-recall 0.80 --max-false-positives 0

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-history
          path: |
            benchmarks/history/benchmark_latest.json
            benchmarks/history/benchmark_trend.jsonl
          if-no-files-found: warn
