name: Analytics Weekly Ops

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 5"

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-metrics-log:
    name: Weekly Metrics Log
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append weekly metrics
        shell: pwsh
        env:
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_API_BASE: ${{ vars.ANALYTICS_API_BASE }}
        run: |
          $apiBase = if ($env:ANALYTICS_API_BASE) { $env:ANALYTICS_API_BASE } else { "https://api.lowermymedicalbills.com" }
          ./scripts/run-weekly-metrics.ps1 -ApiBase $apiBase -AnalyticsApiKey $env:ANALYTICS_API_KEY

      - name: Open PR for weekly metrics log
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/weekly-analytics-log
          commit-message: "chore: append weekly analytics metrics"
          title: "chore: append weekly analytics metrics"
          body: "Automated weekly metrics log update. Requires Benchmark Release Gate to pass before merge."
          labels: automated,analytics
          add-paths: docs/analytics_weekly_log.md

  threshold-check:
    name: Threshold Check
    runs-on: ubuntu-latest
    needs: weekly-metrics-log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run threshold check
        shell: pwsh
        env:
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_API_BASE: ${{ vars.ANALYTICS_API_BASE }}
        run: |
          $apiBase = if ($env:ANALYTICS_API_BASE) { $env:ANALYTICS_API_BASE } else { "https://api.lowermymedicalbills.com" }
          ./scripts/run-analytics-threshold-check.ps1 -ApiBase $apiBase -AnalyticsApiKey $env:ANALYTICS_API_KEY
